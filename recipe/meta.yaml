{% set name = "trexio" %}
{% set version = "2.6.1" %}
{% set build = 1 %}

{% if mpi == "nompi" %}
  # Prioritize nompi via build number
  {% set build = build + 100 %}
{% endif %}

{% if mpi != "nompi" %}
  {% set mpi_prefix = "mpi_" + mpi %}
{% else %}
  {% set mpi_prefix = "nompi" %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/TREX-CoE/trexio/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: c3694ec1528632a386a2af89199c75d70ecd45bfcc2ca1d4ccccbfa1308ad5fa

build:
  number: {{ build }}
  skip: true  # [win]
  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}
  run_exports:
    - {{ pin_subpackage("trexio", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ compiler("fortran") }}
    - {{ mpi }}  # [mpi != "nompi"]
    - cmake
    - ninja
    - pkg-config
  host:
    - {{ mpi }}  # [mpi != "nompi"]
    - hdf5 >=2.1  # [mpi == "nompi"]
    - "hdf5 * {{ mpi_prefix }}_*"  # [mpi != "nompi"]
    - zlib
  run:
    - {{ mpi }}  # [mpi != "nompi"]

test:
  commands:
    - test -f ${PREFIX}/lib/libtrexio${SHLIB_EXT}  # [unix]
    - test -f ${PREFIX}/include/trexio.h  # [unix]

about:
  home: https://github.com/TREX-CoE/trexio
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: TREX library for efficient I/O
  description: |
    The TREXIO library defines a standard format for storing wave functions,
    together with an C-compatible API such that it can be easily used in
    any programming language.
  doc_url: https://trex-coe.github.io/trexio/
  dev_url: https://github.com/TREX-CoE/trexio

extra:
  recipe-maintainers:
    - q-posev
    - mkrack
